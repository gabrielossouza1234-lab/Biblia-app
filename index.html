  if (window.playablesSDK) return;

  var firstInteractionSent = false;

  var frameCount = 0;

  function hasIOSBridge() {
    return !!(window.webkit &&
              window.webkit.messageHandlers &&
              window.webkit.messageHandlers[HANDLER_NAME]);

    return !!(window[ANDROID_BRIDGE_NAME] &&
              typeof window[ANDROID_BRIDGE_NAME].postEvent === 'function');
  }

  function isInIframe() {
    return !!(window.parent && window.parent !== window);
  }

  function sendEvent(eventName, payload) {
    var message = {
      type: eventName,
      payload: payload || {},
      timestamp: Date.now()
    };

      try {
        window.webkit.messageHandlers[HANDLER_NAME].postMessage(message);
      } catch (e) { /* ignore */ }

        eventName,
        JSON.stringify(p)

    return;
  }

    if (isInIframe()) {
      try {
        window.parent.postMessage(message, '*');
      } catch (e) { /* ignore */ }
      return;
    }
  }

  // --- rAF Game-Ready Detection ---

  function onFrame() {
    if (gameReadySent) return;

    frameCount++;
    if (frameCount >= RAF_FRAME_THRESHOLD) {
      gameReadySent = true;
      sendEvent('game_ready', {
        frame_count: frameCount,
        detected_at: Date.now()

      return;

    originalRAF.call(window, onFrame);
  }

  if (originalRAF) {
    window.requestAnimationFrame = function(callback) {
      if (!gameReadySent) {
        return originalRAF.call(window, function(timestamp) {

              detected_at: Date.now()

    }

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0a0015">
<title>Bíblia ContonCreat v5</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent }
:root {
  --bg:#0a0015; --bg2:#1e0533; --surface:rgba(255,255,255,0.06);
  --text:#ffffff; --muted:#a78bfa; --highlight:#facc15;
  --font-size:18px; --radius:14px;
}
html, body { height:100%; overflow-x:hidden }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Inter, sans-serif;
  background: linear-gradient(180deg, var(--bg2) 0%, var(--bg) 100%);
  color: var(--text); line-height:1.6; -webkit-font-smoothing:antialiased;
}
button { font-family:inherit }

/* Loading */
#loading {
  position:fixed; inset:0; z-index:9999; display:flex; flex-direction:column;
  align-items:center; justify-content:center; background:#050008; transition:opacity .5s;
}
.logo-load {
  font-size:2.2rem; font-weight:900; letter-spacing:-1px; margin-bottom:2rem;
  background:linear-gradient(90deg,#a78bfa,#ec4899,#8b5cf6);
  -webkit-background-clip:text; background-clip:text; color:transparent;
  animation:pulse 2s infinite;
}
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.7} }
.progress-wrap { width:82%; max-width:340px }
.progress-bar { width:100%; height:8px; background:rgba(255,255,255,.08); border-radius:99px; overflow:hidden; padding:2px }
.progress-fill { height:100%; width:0%; background:linear-gradient(90deg,#7c3aed,#ec4899); border-radius:99px; transition:width .3s; box-shadow:0 0 20px rgba(236,72,153,.5) }
#loading-text { margin-top:1rem; color:var(--muted); font-size:.9rem; text-align:center }
.fonts-load { display:flex; gap:.5rem; margin-top:1.5rem; font-size:.75rem; color:#64748b }
.font-dot { width:8px; height:8px; border-radius:50%; background:#334155 }
.font-dot.active { background:#a78bfa; box-shadow:0 0 8px #a78bfa }

/* App */
#app { min-height:100vh; display:flex; flex-direction:column }
header {
  position:sticky; top:0; z-index:30; display:flex; align-items:center; gap:.6rem;
  padding:.7rem .9rem; background:rgba(10,0,21,.85); backdrop-filter:blur(16px);
  border-bottom:1px solid rgba(167,139,250,.15);
}
.icon-btn {
  width:40px; height:40px; display:grid; place-items:center; flex-shrink:0;
  background:var(--surface); border:1px solid rgba(255,255,255,.08); border-radius:12px;
  color:var(--text); cursor:pointer; transition:.2s;
}
.icon-btn:active { transform:scale(.93); background:rgba(255,255,255,.12) }
.icon-btn svg { width:20px; height:20px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round }
#headerTitle { flex:1; font-size:1.05rem; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis }
.header-actions { display:flex; gap:.5rem }

/* Sidebar */
#overlay { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(2px); z-index:39; opacity:0; pointer-events:none; transition:.3s }
#overlay.show { opacity:1; pointer-events:all }
#sidebar {
  position:fixed; top:0; left:0; bottom:0; width:300px; max-width:86vw; z-index:40;
  background:linear-gradient(180deg,#14031f 0%, #07000d 100%); border-right:1px solid rgba(167,139,250,.2);
  transform:translateX(-100%); transition:transform .35s cubic-bezier(.2,.8,.2,1);
  display:flex; flex-direction:column;
}
#sidebar.open { transform:translateX(0) }
.sidebar-top { padding:1rem; border-bottom:1px solid rgba(255,255,255,.08) }
#searchInput {
  width:100%; padding:.75rem .9rem; background:rgba(0,0,0,.4); border:1px solid rgba(167,139,250,.25);
  border-radius:12px; color:var(--text); font-size:.95rem; outline:none;
}
#searchInput:focus { border-color:#8b5cf6; box-shadow:0 0 0 3px rgba(139,92,246,.2) }
.books { flex:1; overflow-y:auto; padding:.6rem; scrollbar-width:thin }
.book-btn {
  width:100%; display:flex; align-items:center; justify-content:space-between;
  padding:.7rem .85rem; margin-bottom:.25rem; background:transparent; border:none;
  color:#d1c5f5; border-radius:10px; cursor:pointer; text-align:left; font-size:.95rem;
  transition:.2s;
}
.book-btn:hover { background:rgba(255,255,255,.05); color:#fff }
.book-btn.active { background:linear-gradient(90deg,#7c3aed,#a21caf); color:#fff; font-weight:600; box-shadow:0 4px 14px rgba(124,58,237,.3) }
.book-chapters { font-size:.75rem; opacity:.6 }
.sidebar-foot { padding:.8rem; border-top:1px solid rgba(255,255,255,.08) }
.fav-btn { width:100%; padding:.7rem; background:var(--surface); border:1px solid rgba(255,255,255,.08); border-radius:12px; color:var(--text); cursor:pointer; font-size:.9rem }

/* Main */
main { flex:1; width:100%; max-width:820px; margin:0 auto; padding:1rem .9rem 140px }
.chapter-head { margin:1.5rem 0 1rem; text-align:center }
.chapter-head h2 { font-size:1.6rem; font-weight:800; letter-spacing:-.5px; background:linear-gradient(90deg,#fff,#c4b5fd); -webkit-background-clip:text; color:transparent }
.verses { display:flex; flex-direction:column; gap:.15rem }
.verse {
  display:flex; gap:.75rem; align-items:flex-start; padding:.65rem .7rem .65rem .9rem;
  border-radius:12px; position:relative; transition:.2s; border-left:3px solid transparent;
}
.verse:active { background:rgba(255,255,255,.03) }
.verse.highlighted {
  background:color-mix(in srgb, var(--highlight) 16%, transparent);
  border-left-color:var(--highlight);
}
.verse-num {
  font-size:.78rem; font-weight:700; color:var(--muted); min-width:1.7rem; padding-top:.25rem;
  user-select:none; font-variant-numeric:tabular-nums; cursor:pointer;
}
.verse.favorited .verse-num { color:#facc15; text-shadow:0 0 10px rgba(250,204,21,.5) }
.verse.favorited .verse-num::after { content:"★"; margin-left:3px; font-size:.7rem }
.verse-text { flex:1; font-size:var(--font-size); line-height:1.75; color:var(--text); word-wrap:break-word }
.verse-actions {
  display:flex; gap:4px; margin-left:.3rem; opacity:.55; transition:.2s; flex-shrink:0; padding-top:.1rem;
}
.verse:hover .verse-actions, .verse:focus-within .verse-actions { opacity:1 }
.v-btn {
  width:30px; height:30px; display:grid; place-items:center; background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08); border-radius:8px; color:#c4b5fd; cursor:pointer; transition:.2s;
}
.v-btn:hover { background:rgba(255,255,255,.12); color:#fff; transform:translateY(-1px) }
.v-btn:active { transform:scale(.92) }
.v-btn svg { width:15px; height:15px }

/* Footer nav */
.chap-nav {
  position:fixed; bottom:78px; left:50%; transform:translateX(-50%); z-index:20;
  display:flex; align-items:center; gap:.5rem; padding:.45rem; background:rgba(15,0,30,.9);
  backdrop-filter:blur(16px); border:1px solid rgba(167,139,250,.25); border-radius:99px; box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.chap-nav button {
  padding:.55rem 1rem; border:none; background:var(--surface); color:var(--text); border-radius:99px;
  font-size:.85rem; font-weight:600; cursor:pointer; transition:.2s;
}
.chap-nav button:active { transform:scale(.95) }
.chap-nav button:disabled { opacity:.4 }
#chapterSelect {
  background:rgba(0,0,0,.5); color:#fff; border:1px solid rgba(255,255,255,.15); border-radius:99px;
  padding:.5rem .8rem; font-size:.9rem; font-weight:600; min-width:70px; text-align:center;
}

/* Pix */
#pixBtn {
  position:fixed; bottom:16px; left:50%; transform:translateX(-50%); z-index:25;
  padding:.7rem 1.3rem; background:linear-gradient(90deg,#7c3aed,#ec4899); color:#fff; border:none;
  border-radius:99px; font-weight:700; font-size:.88rem; cursor:pointer; white-space:nowrap;
  box-shadow:0 8px 24px rgba(124,58,237,.4), inset 0 1px 0 rgba(255,255,255,.2); transition:.2s;
}
#pixBtn:active { transform:translateX(-50%) scale(.96) }

/* Settings Panel */
.panel { position:fixed; inset:0; z-index:60; display:grid; place-items:center; padding:1rem; background:rgba(0,0,0,.75); backdrop-filter:blur(10px); opacity:0; pointer-events:none; transition:.3s }
.panel.show { opacity:1; pointer-events:all }
.panel-content {
  width:100%; max-width:440px; max-height:88vh; overflow:auto; background:linear-gradient(180deg,#1a0730,#080010);
  border:1px solid rgba(167,139,250,.3); border-radius:24px; padding:1.5rem; box-shadow:0 20px 60px rgba(0,0,0,.7);
  transform:translateY(20px); transition:.3s;
}
.panel.show .panel-content { transform:translateY(0) }
.panel h2 { font-size:1.3rem; margin-bottom:1.2rem; font-weight:800 }
.setting-group { margin-bottom:1.4rem }
.setting-group > label { display:block; font-size:.9rem; color:#c4b5fd; margin-bottom:.6rem; font-weight:600 }
.range-wrap { display:flex; align-items:center; gap:1rem }
input[type=range] { flex:1; height:6px; -webkit-appearance:none; appearance:none; background:rgba(255,255,255,.1); border-radius:99px; outline:none }
input[type=range]::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%; background:#fff; border:2px solid #8b5cf6; box-shadow:0 2px 6px rgba(0,0,0,.4); cursor:pointer }
#fontSizeVal { min-width:48px; text-align:right; font-variant-numeric:tabular-nums; color:#fff; font-weight:700 }
.options { display:flex; flex-wrap:wrap; gap:.5rem }
.opt-btn {
  padding:.6rem .95rem; background:rgba(255,255,255,.06); border:1.5px solid rgba(255,255,255,.1);
  border-radius:12px; color:#e9e5ff; font-size:.88rem; font-weight:600; cursor:pointer; transition:.2s;
}
.opt-btn.active { background:rgba(139,92,246,.25); border-color:#8b5cf6; color:#fff; box-shadow:0 0 0 3px rgba(139,92,246,.2) }
.opt-btn.color-dot { width:42px; height:42px; padding:0; border-radius:50%; border-width:3px }
.opt-btn.color-dot.active { transform:scale(1.1) }

/* Toast */
#toast {
  position:fixed; bottom:120px; left:50%; transform:translateX(-50%) translateY(20px);
  background:#111; color:#fff; padding:.75rem 1.2rem; border-radius:12px; font-size:.9rem; font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.5); opacity:0; pointer-events:none; transition:.3s; z-index:100;
  border:1px solid rgba(255,255,255,.1); white-space:nowrap; max-width:90vw;
}
#toast.show { opacity:1; transform:translateX(-50%) translateY(0) }

/* Desktop */
@media(min-width:1024px){
  #sidebar { transform:none; width:320px }
  #overlay { display:none }
  header { left:320px }
  main { margin-left:320px; max-width:900px; padding:1.5rem 2rem 150px }
  .chap-nav { left:calc(50% + 160px) }
  #menuBtn { display:none }
}

/* Scrollbar */
::-webkit-scrollbar { width:8px; height:8px }
::-webkit-scrollbar-thumb { background:rgba(167,139,250,.3); border-radius:4px }
::-webkit-scrollbar-thumb:hover { background:rgba(167,139,250,.5) }

.hidden { display:none !important }
</style>
</head>

    {name:"Sofonias",ch:3},{name:"Ageu",ch:2},{name:"Zacarias",ch:14},{name:"Malaquias",ch:4},{name:"Mateus",ch:28},
    {name:"Marcos",ch:16},{name:"Lucas",ch:24},{name:"João",ch:21},{name:"Atos",ch:28},{name:"Romanos",ch:16},
    {name:"1 Coríntios",ch:16},{name:"2 Coríntios",ch:13},{name:"Gálatas",ch:6},{name:"Efésios",ch:6},{name:"Filipenses",ch:4},
    {name:"Colossenses",ch:4},{name:"1 Tessalonicenses",ch:5},{name:"2 Tessalonicenses",ch:3},{name:"1 Timóteo",ch:6},
    {name:"2 Timóteo",ch:4},{name:"Tito",ch:3},{name:"Filemom",ch:1},{name:"Hebreus",ch:13},{name:"Tiago",ch:5},
    {name:"1 Pedro",ch:5},{name:"2 Pedro",ch:3},{name:"1 João",ch:5},{name:"2 João",ch:1},{name:"3 João",ch:1},
    {name:"Judas",ch:1},{name:"Apocalipse",ch:22}
  ];

  const genesis1 = [
    "No princípio, criou Deus os céus e a terra.",
    "E a terra era sem forma e vazia; e havia trevas sobre a face do abismo; e o Espírito de Deus se movia sobre a face das águas.",
    "E disse Deus: Haja luz. E houve luz.",
    "E viu Deus que era boa a luz; e fez Deus separação entre a luz e as trevas.",
    "E Deus chamou à luz Dia; e às trevas chamou Noite. E foi a tarde e a manhã: o dia primeiro.",
    "E disse Deus: Haja uma expansão no meio das águas, e haja separação entre águas e águas.",
    "E fez Deus a expansão e fez separação entre as águas que estavam debaixo da expansão e as águas que estavam sobre a expansão. E assim foi.",
    "E chamou Deus à expansão Céus; e foi a tarde e a manhã: o dia segundo.",
    "E disse Deus: Ajuntem-se as águas debaixo dos céus num lugar; e apareça a porção seca. E assim foi.",
    "E chamou Deus à porção seca Terra; e ao ajuntamento das águas chamou Mares. E viu Deus que era bom.",
    "E disse Deus: Produza a terra erva verde, erva que dê semente, árvore frutífera que dê fruto segundo a sua espécie, cuja semente esteja nela sobre a terra. E assim foi.",
    "E a terra produziu erva, erva dando semente conforme a sua espécie e árvore frutífera, cuja semente está nela conforme a sua espécie. E viu Deus que era bom.",
    "E foi a tarde e a manhã: o dia terceiro.",
    "E disse Deus: Haja luminares na expansão dos céus, para haver separação entre o dia e a noite; e sejam eles para sinais e para tempos determinados e para dias e anos.",
    "E sejam para luminares na expansão dos céus, para alumiar a terra. E assim foi.",
    "E fez Deus os dois grandes luminares: o luminar maior para governar o dia, e o luminar menor para governar a noite; e fez as estrelas.",
    "E Deus os pôs na expansão dos céus para alumiar a terra,",
    "e para governar o dia e a noite, e para fazer separação entre a luz e as trevas. E viu Deus que era bom.",
    "E foi a tarde e a manhã: o dia quarto.",
    "E disse Deus: Produzam as águas abundantemente répteis de alma vivente; e voem as aves sobre a face da expansão dos céus.",
    "E Deus criou as grandes baleias, e todo réptil de alma vivente que as águas abundantemente produziram conforme as suas espécies, e toda ave de asas conforme a sua espécie. E viu Deus que era bom.",
    "E Deus os abençoou, dizendo: Frutificai, e multiplicai-vos, e enchei as águas nos mares; e as aves se multipliquem na terra.",
    "E foi a tarde e a manhã: o dia quinto.",
    "E disse Deus: Produza a terra alma vivente conforme a sua espécie; gado, e répteis, e bestas-feras da terra conforme a sua espécie. E assim foi.",
    "E fez Deus as bestas-feras da terra conforme a sua espécie, e o gado conforme a sua espécie, e todo réptil da terra conforme a sua espécie. E viu Deus que era bom.",
    "E disse Deus: Façamos o homem à nossa imagem, conforme a nossa semelhança; e domine sobre os peixes do mar, e sobre as aves dos céus, e sobre o gado, e sobre toda a terra, e sobre todo réptil que se move sobre a terra.",
    "E criou Deus o homem à sua imagem; à imagem de Deus o criou; macho e fêmea os criou.",
    "E Deus os abençoou e Deus lhes disse: Frutificai, e multiplicai-vos, e enchei a terra, e sujeitai-a; e dominai sobre os peixes do mar, e sobre as aves dos céus, e sobre todo o animal que se move sobre a terra.",
    "E disse Deus: Eis que vos tenho dado toda erva que dá semente e que está sobre a face de toda a terra e toda árvore em que há fruto de árvore que dá semente; ser-vos-ão para mantimento.",
    "E a todo animal da terra, e a toda ave dos céus, e a todo réptil da terra, em que há alma vivente, toda a erva verde lhes será para mantimento. E assim foi.",
    "E viu Deus tudo quanto tinha feito, e eis que era muito bom. E foi a tarde e a manhã: o dia sexto."
  ];

  // ===== ESTADO =====
  let db, currentBook=0, currentChapter=1, currentVerses=[];
  let highlights = JSON.parse(localStorage.getItem('cc_highlights_v5')||'{}');
  let favorites = JSON.parse(localStorage.getItem('cc_favorites_v5')||'{}');
  let settings = JSON.parse(localStorage.getItem('cc_settings_v5')||'null') || {
    fontSize:18, textColor:'branco', highlightColor:'amarelo', theme:'roxo'
  };

  const textColors = {branco:'#ffffff', creme:'#f5e9c9', amarelo:'#fff9b0'};
  const highlightColors = {amarelo:'#facc15', verde:'#22c55e', azul:'#3b82f6', rosa:'#ec4899'};
  const themes = {
    roxo:{bg:'#0a0015',bg2:'#1e0533'},
    escuro:{bg:'#020617',bg2:'#0f172a'},
    preto:{bg:'#000000',bg2:'#000000'}
  };

  // ===== ELEMENTOS =====
  const $ = s => document.querySelector(s);
  const versesEl = $('#verses');
  const toastEl = $('#toast');

  // ===== UTILS =====
  const showToast = (msg) => {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(showToast.t);
    showToast.t = setTimeout(()=>toastEl.classList.remove('show'), 2000);
  };
  const copyText = async (txt) => {
    try { await navigator.clipboard.writeText(txt); }
    catch { const ta=document.createElement('textarea'); ta.value=txt; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }
  };
  const saveSettings = () => localStorage.setItem('cc_settings_v5', JSON.stringify(settings));
  const saveHighlights = () => localStorage.setItem('cc_highlights_v5', JSON.stringify(highlights));
  const saveFavorites = () => localStorage.setItem('cc_favorites_v5', JSON.stringify(favorites));

  // ===== SETTINGS =====
  function applySettings(){
    document.documentElement.style.setProperty('--font-size', settings.fontSize+'px');
    document.documentElement.style.setProperty('--text', textColors[settings.textColor]);
    document.documentElement.style.setProperty('--highlight', highlightColors[settings.highlightColor]);
    const th = themes[settings.theme];
    document.documentElement.style.setProperty('--bg', th.bg);
    document.documentElement.style.setProperty('--bg2', th.bg2);
    $('#fontSize').value = settings.fontSize;
    $('#fontSizeVal').textContent = settings.fontSize+'px';
    document.querySelectorAll('[data-text]').forEach(b=>b.classList.toggle('active', b.dataset.text===settings.textColor));
    document.querySelectorAll('[data-hl]').forEach(b=>b.classList.toggle('active', b.dataset.hl===settings.highlightColor));
    document.querySelectorAll('[data-theme]').forEach(b=>b.classList.toggle('active', b.dataset.theme===settings.theme));
  }

  // ===== INDEXEDDB =====
  function openDB(){
    return new Promise((res,rej)=>{
      const req = indexedDB.open('biblia-cc-v5',1);
      req.onupgradeneeded = e => { const d=e.target.result; if(!d.objectStoreNames.contains('chapters')) d.createObjectStore('chapters',{keyPath:'id'}); };
      req.onsuccess = e => { db=e.target.result; res(); };
      req.onerror = rej;
    });
  }
  function getChapterDB(id){
    return new Promise(res=>{
      const tx = db.transaction('chapters','readonly'); const st=tx.objectStore('chapters'); const rq=st.get(id);
      rq.onsuccess=()=>res(rq.result); rq.onerror=()=>res(null);
    });
  }
  function putChapterDB(data){
    const tx = db.transaction('chapters','readwrite'); tx.objectStore('chapters').put(data);
  }

  // ===== LOADING =====
  async function simulateLoading(){
    const fill=$('#progressFill'), text=$('#loading-text');
    const dots=[ $('#dot1'), $('#dot2'), $('#dot3') ];
    let p=0;
    for(let i=0;i<3;i++){
      dots[i].classList.add('active');
      text.textContent = `Baixando fonte ${i+1} de 3: ${['NVI','ARA','ACF'][i]}...`;
      for(let j=0;j<34;j++){ p+= Math.random()*1.8+0.8; fill.style.width=Math.min(p,100)+'%'; await new Promise(r=>setTimeout(r,35)); }
    }
    text.textContent='Organizando livros para modo offline...';
    fill.style.width='100%';
    await new Promise(r=>setTimeout(r,700));
    $('#loading').style.opacity='0';
    await new Promise(r=>setTimeout(r,400));
    $('#loading').remove();
    $('#app').hidden=false;
  }

  // ===== RENDER =====
  function renderBooks(filter=''){
    const list = $('#booksList'); list.innerHTML='';
    books.forEach((b,i)=>{
      if(filter && !b.name.toLowerCase().includes(filter.toLowerCase())) return;
      const btn=document.createElement('button');
      btn.className='book-btn'+(i===currentBook?' active':'');
      btn.innerHTML=`<span>${b.name}</span><span class="book-chapters">${b.ch}</span>`;
      btn.onclick=()=>{ currentBook=i; currentChapter=1; loadChapter(); closeSidebar(); renderBooks($('#searchInput').value); };
      list.appendChild(btn);
    });
  }

  async function loadChapter(){
    const id = `${currentBook}-${currentChapter}`;
    $('#headerTitle').textContent = `${books[currentBook].name} ${currentChapter}`;
    $('#chapterTitle').textContent = `${books[currentBook].name} ${currentChapter}`;
    
    // chapter select
    const sel=$('#chapterSelect'); sel.innerHTML=''; 
    for(let i=1;i<=books[currentBook].ch;i++){ const o=document.createElement('option'); o.value=i; o.textContent=i; if(i===currentChapter)o.selected=true; sel.appendChild(o); }
    $('#prevChap').disabled = currentChapter===1;
    $('#nextChap').disabled = currentChapter===books[currentBook].ch;

    // get from DB
    let data = await getChapterDB(id);
    if(!data){
      let verses=[];
      if(currentBook===0 && currentChapter===1){
        verses = genesis1.map((t,i)=>({num:i+1,text:t}));
      }else{
        const count = currentBook===18 ? 6+Math.floor(Math.random()*8) : 15+Math.floor(Math.random()*12);
        for(let v=1; v<=count; v++){
          verses.push({num:v, text:generateVerseText(currentBook,currentChapter,v)});
        }
      }
      data = {id, book:currentBook, chapter:currentChapter, verses, ts:Date.now()};
      putChapterDB(data);
    }
    currentVerses = data.verses;
    renderVerses();
    window.scrollTo({top:0,behavior:'smooth'});
  }

  function generateVerseText(b,c,v){
    const samples=[
      `Confia no Senhor de todo o teu coração e não te estribes no teu próprio entendimento.`,
      `O Senhor é o meu pastor; nada me faltará.`,
      `Porque Deus amou o mundo de tal maneira que deu o seu Filho unigênito.`,
      `Tudo posso naquele que me fortalece.`,
      `Lâmpada para os meus pés é tua palavra, e luz para o meu caminho.`
    ];
    return samples[(b+c+v)%samples.length] + ` (${books[b].name} ${c}:${v})`;
  }

  function renderVerses(){
    versesEl.innerHTML='';
    $('#favCount').textContent = Object.keys(favorites).length;
    currentVerses.forEach(v=>{
      const ref = `${currentBook}-${currentChapter}-${v.num}`;
      const div=document.createElement('div');
      div.className='verse'+(highlights[ref]?' highlighted':'')+(favorites[ref]?' favorited':'');
      div.dataset.ref=ref;
      div.innerHTML=`
        <span class="verse-num" title="Duplo clique para favoritar">${v.num}</span>
        <p class="verse-text">${v.text}</p>
        <div class="verse-actions">
          <button class="v-btn v-share" title="Compartilhar" aria-label="Compartilhar">
            <svg viewBox="0 0 24 24"><path d="M4 12v7a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-7"/><polyline points="16 6 12 2 8 6"/><line x1="12" y1="2" x2="12" y2="15"/></svg>
          </button>
          <button class="v-btn v-highlight" title="Grifar" aria-label="Grifar">
            <svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4 12.5-12.5z"/></svg>
          </button>
          <button class="v-btn v-copy" title="Copiar" aria-label="Copiar">
            <svg viewBox="0 0 24 24"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          </button>
        </div>
      `;
      // actions
      div.querySelector('.v-share').onclick = e=>{ e.stopPropagation(); shareVerse(v); };
      div.querySelector('.v-highlight').onclick = e=>{ e.stopPropagation(); toggleHighlight(ref,div); };
      div.querySelector('.v-copy').onclick = e=>{ e.stopPropagation(); copyVerse(v); };
      
      // favorite on double click number
      div.querySelector('.verse-num').ondblclick = ()=> toggleFavorite(ref,div);
      
      // long press
      let pressTimer;
      const startPress = ()=>{ pressTimer=setTimeout(()=>{ toggleHighlight(ref,div); navigator.vibrate?.(20); }, 600); };
      const cancelPress = ()=> clearTimeout(pressTimer);
      div.addEventListener('touchstart', startPress, {passive:true});
      div.addEventListener('touchend', cancelPress);
      div.addEventListener('touchmove', cancelPress);
      div.addEventListener('mousedown', startPress);
      div.addEventListener('mouseup', cancelPress);
      div.addEventListener('mouseleave', cancelPress);
      div.addEventListener('contextmenu', e=>e.preventDefault());

      versesEl.appendChild(div);
    });
  }

  function toggleHighlight(ref,el){
    if(highlights[ref]){ delete highlights[ref]; el.classList.remove('highlighted'); showToast('Grifo removido'); }
    else{ highlights[ref]=true; el.classList.add('highlighted'); showToast('Versículo grifado'); }
    saveHighlights();
  }
  function toggleFavorite(ref,el){
    if(favorites[ref]){ delete favorites[ref]; el.classList.remove('favorited'); showToast('Removido dos favoritos'); }
    else{ favorites[ref]=true; el.classList.add('favorited'); showToast('Adicionado aos favoritos ★'); }
    saveFavorites(); $('#favCount').textContent=Object.keys(favorites).length;
  }
  async function shareVerse(v){
    const txt = `${books[currentBook].name} ${currentChapter}:${v.num}\n${v.text}\n\n— Bíblia ContonCreat`;
    try{ if(navigator.share) await navigator.share({title:`${books[currentBook].name} ${currentChapter}:${v.num}`, text:txt}); else throw 0; }
    catch{ await copyText(txt); showToast('Versículo copiado'); }
  }
  async function copyVerse(v){
    await copyText(`${books[currentBook].name} ${currentChapter}:${v.num} - ${v.text}`);
    showToast('Copiado');
  }
  async function shareChapter(){
    const txt = `${books[currentBook].name} ${currentChapter}\n\n`+currentVerses.map(v=>`${v.num}. ${v.text}`).join('\n')+`\n\n— Bíblia ContonCreat`;
    try{ if(navigator.share) await navigator.share({title:`${books[currentBook].name} ${currentChapter}`, text:txt}); else throw 0; }
    catch{ await copyText(txt); showToast('Capítulo copiado'); }
  }

  // ===== SIDEBAR =====
  const sidebar=$('#sidebar'), overlay=$('#overlay');
  function openSidebar(){ sidebar.classList.add('open'); overlay.classList.add('show'); }
  function closeSidebar(){ sidebar.classList.remove('open'); overlay.classList.remove('show'); }
  $('#menuBtn').onclick=openSidebar; overlay.onclick=closeSidebar;

  // ===== SEARCH =====
  $('#searchInput').addEventListener('input', e=> renderBooks(e.target.value));
  $('#searchInput').addEventListener('keydown', e=>{
    if(e.key==='Enter'){
      const q=e.target.value.trim();
      const m=q.match(/^(\d?\s*[a-zà-ú]+)\s+(\d+)(?::(\d+))?$/i);
      if(m){
        const name=m[1].toLowerCase().replace(/\s+/g,'');
        const idx=books.findIndex(b=>b.name.toLowerCase().replace(/\s+/g,'').startsWith(name));
        if(idx>-1){ currentBook=idx; currentChapter=Math.min(parseInt(m[2]),books[idx].ch); loadChapter(); closeSidebar(); showToast(`Abrindo ${books[idx].name} ${currentChapter}`); }
      }
    }
  });

  // ===== NAV =====
  $('#prevChap').onclick=()=>{ if(currentChapter>1){ currentChapter--; loadChapter(); } };
  $('#nextChap').onclick=()=>{ if(currentChapter<books[currentBook].ch){ currentChapter++; loadChapter(); } };
  $('#chapterSelect').onchange=e=>{ currentChapter=parseInt(e.target.value); loadChapter(); };

  // ===== SETTINGS PANEL =====
  const settingsPanel=$('#settingsPanel');
  $('#settingsBtn').onclick=()=>settingsPanel.classList.add('show');
  $('#closeSettings').onclick=()=>settingsPanel.classList.remove('show');
  settingsPanel.onclick=e=>{ if(e.target===settingsPanel) settingsPanel.classList.remove('show'); };
  $('#fontSize').oninput=e=>{ settings.fontSize=parseInt(e.target.value); applySettings(); saveSettings(); };
  document.querySelectorAll('[data-text]').forEach(b=>b.onclick=()=>{ settings.textColor=b.dataset.text; applySettings(); saveSettings(); });
  document.querySelectorAll('[data-hl]').forEach(b=>b.onclick=()=>{ settings.highlightColor=b.dataset.hl; applySettings(); saveSettings(); });
  document.querySelectorAll('[data-theme]').forEach(b=>b.onclick=()=>{ settings.theme=b.dataset.theme; applySettings(); saveSettings(); });

  // ===== OUTROS =====
  $('#shareChapterBtn').onclick=shareChapter;
  $('#pixBtn').onclick=async()=>{ await copyText('gstudio900@gmail.com'); showToast('Pix copiado: gstudio900@gmail.com'); };
  $('#showFavs').onclick=()=>{
    const favs=Object.keys(favorites);
    if(!favs.length) return showToast('Nenhum favorito ainda');
    // vai para o primeiro favorito
    const [b,c]=favs[0].split('-').map(Number);
    currentBook=b; currentChapter=c; loadChapter(); closeSidebar();
    showToast(`${favs.length} versículos favoritados`);
  };

  // ===== INIT =====
  async function init(){
    applySettings();
    renderBooks();
    await openDB();
    await simulateLoading();
    loadChapter();
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded', init); else init();

  // Service Worker for offline (simple cache)
  if('serviceWorker' in navigator){
    const swCode = `self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('fetch',e=>{});`;
    const blob = new Blob([swCode],{type:'text/javascript'}); navigator.serviceWorker.register(URL.createObjectURL(blob)).catch(()=>{});
  }
})();
</script>
</body>
</html>
